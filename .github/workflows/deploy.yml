name: CI/CD for springbootpx13e

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.HELLO_GITHUB_ACTION_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}      # 你的服务器公网 IP
          username: ${{ secrets.SERVER_USER }}  # 你的服务器登录用户名 (通常是 root)
          password: ${{ secrets.SERVER_PASSWORD }}   # 你的服务器密码 (如果用密钥就填 key)
          script: |
            cd /opt/competition
            # 登录 GHCR 仓库 (如果你的仓库是私有的需要登录，公开的话可以省略)
            echo ${{ secrets.HELLO_GITHUB_ACTION_SECRET }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # 拉取最新镜像
            docker pull ghcr.io/${{ github.repository }}:latest
            # 重新启动容器
            docker-compose up -d
            # 清理掉旧的废弃镜像，防止把服务器硬盘撑爆
            docker image prune -f

<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>学生注册</title>
	<link rel="stylesheet" type="text/css" href="../../layui/css/layui.css">
	<link rel="stylesheet" type="text/css" href="../../xznstatic/css/common.css" />
	<link rel="stylesheet" type="text/css" href="../../xznstatic/css/style.css" />
	<style type="text/css">
		body {
			background: #f0f2f5;
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			background-image: linear-gradient(135deg, #ffffff 0%, #1E9FFF 100%);
		}

		.login-card {
			width: 400px;
			background: #fff;
			padding: 40px;
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
		}

		.login-header {
			text-align: center;
			margin-bottom: 30px;
		}

		.login-header h2 {
			font-size: 24px;
			color: #333;
			font-weight: 600;
		}

		.input-group {
			margin-bottom: 20px;
			position: relative;
		}

		.input-group .layui-icon {
			position: absolute;
			left: 12px;
			top: 12px;
			color: #999;
			font-size: 18px;
		}

		.login-input {
			width: 100%;
			height: 42px;
			padding-left: 40px;
			border: 1px solid #ddd;
			border-radius: 4px;
			outline: none;
			transition: all 0.3s;
			box-sizing: border-box;
		}

		.login-input:focus {
			border-color: #1E9FFF;
			box-shadow: 0 0 0 2px rgba(30, 159, 255, 0.2);
		}

		.btn-login {
			width: 100%;
			height: 42px;
			background-color: #1E9FFF;
			color: #fff;
			font-size: 16px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			transition: background 0.3s;
		}

		.btn-login:hover {
			background-color: #0088ee;
		}

		.login-footer {
			margin-top: 20px;
			text-align: center;
			font-size: 13px;
		}

		.login-footer a {
			color: #1E9FFF;
			margin: 0 5px;
		}
	</style>
</head>

<body>
	<div id="app" class="login-card">
		<div class="login-header">
			<h2>学生注册</h2>
		</div>

		<form class="layui-form">
			<div class="input-group">
				<i class="layui-icon layui-icon-username"></i>
				<input type="text" name="xuehao" required lay-verify="required" placeholder="请输入学号" autocomplete="off"
					class="login-input">
			</div>

			<div class="input-group">
				<i class="layui-icon layui-icon-password"></i>
				<input type="password" name="mima" required lay-verify="required" placeholder="请输入密码" autocomplete="off"
					class="login-input">
			</div>

			<div class="input-group">
				<i class="layui-icon layui-icon-user"></i>
				<input type="text" name="xingming" required lay-verify="required" placeholder="请输入姓名" autocomplete="off"
					class="login-input">
			</div>

			<div class="input-group">
				<i class="layui-icon layui-icon-cellphone"></i>
				<input type="text" name="shouji" placeholder="请输入手机" autocomplete="off" class="login-input">
			</div>

			<div class="input-group">
				<i class="layui-icon layui-icon-email"></i>
				<input type="text" name="youxiang" placeholder="请输入邮箱" autocomplete="off" class="login-input">
			</div>

			<div class="input-group">
				<i class="layui-icon layui-icon-card-id"></i>
				<input type="text" name="shenfenzheng" placeholder="请输入身份证" autocomplete="off" class="login-input">
			</div>

			<button class="btn-login" lay-submit lay-filter="register">立即注册</button>

			<div class="login-footer">
				<a href="javascript:window.location.href='../login/login.html'">已有账号？去登录</a>
			</div>
		</form>
	</div>

	<script src="../../layui/layui.js"></script>
	<script src="../../js/vue.js"></script>
	<script src="../../js/config.js"></script>
	<script src="../../modules/config.js"></script>
	<script src="../../js/utils.js"></script>
	<script src="../../js/validate.js"></script>

	<script>
		var vue = new Vue({
			el: '#app',
			data: {},
			methods: {}
		});

		layui.use(['layer', 'element', 'carousel', 'form', 'http', 'jquery'], function () {
			var layer = layui.layer;
			var element = layui.element;
			var carousel = layui.carousel;
			var form = layui.form;
			var http = layui.http;
			var jquery = layui.jquery;

			var tablename = http.getParam('tablename');

			// 注册
			form.on('submit(register)', function (data) {
				data = data.field;
				if (!data.xuehao) {
					layer.msg('学号不能为空', {
						time: 2000,
						icon: 5
					});
					return false
				}
				if (!data.mima) {
					layer.msg('密码不能为空', {
						time: 2000,
						icon: 5
					});
					return false
				}
				if (!data.xingming) {
					layer.msg('姓名不能为空', {
						time: 2000,
						icon: 5
					});
					return false
				}
				if (data.shouji && !isMobile(data.shouji)) {
					layer.msg('手机应输入手机格式', {
						time: 2000,
						icon: 5
					});
					return false
				}
				if (data.youxiang && !isEmail(data.youxiang)) {
					layer.msg('邮箱应输入邮箱格式', {
						time: 2000,
						icon: 5
					});
					return false
				}
				if (data.shenfenzheng && !isIdentity(data.shenfenzheng)) {
					layer.msg('身份证应输入身份证格式', {
						time: 2000,
						icon: 5
					});
					return false
				}
				http.requestJson(tablename + '/register', 'post', data, function (res) {
					layer.msg('注册成功', {
						time: 2000,
						icon: 6
					}, function () {
						// 路径访问设置
						window.location.href = '../login/login.html';
					});
				});
				return false
			});
		});
	</script>
</body>

</html>
